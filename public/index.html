<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1A1410" />
    <meta name="description" content="The Bonfire Method Personal OS" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bonfire" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      body { overscroll-behavior: none; }
      /* Hide CodeSandbox "Open Sandbox" overlay button */
      #open-sandbox,
      [data-csb-open-in-sandbox],
      a[href*="codesandbox.io"][target="_blank"],
      div[class*="open-sandbox"],
      div[class*="OpenSandbox"],
      button[class*="open-sandbox"],
      #csb-ide-indicator { 
        display: none !important; 
        visibility: hidden !important; 
        pointer-events: none !important;
      }
    </style>
    <title>Bonfire Method</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      // Hide any sandbox buttons injected after load
      const hideSandboxButtons = () => {
        const selectors = ['[class*="open-sandbox"]','[class*="OpenSandbox"]','#open-sandbox','a[href*="codesandbox.io/p/sandbox"]'];
        selectors.forEach(s => { document.querySelectorAll(s).forEach(el => { el.style.display = 'none'; }); });
      };
      setTimeout(hideSandboxButtons, 1000);
      setTimeout(hideSandboxButtons, 3000);
    </script>
  </body>
</html>
